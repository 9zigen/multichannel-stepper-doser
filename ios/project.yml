name: StepperDoser
options:
  minimumXcodeGenVersion: 2.39.0
settings:
  base:
    PRODUCT_NAME: StepperDoser
    PRODUCT_BUNDLE_IDENTIFIER: com.alekseyvolkov.stepperdoser
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
targets:
  StepperDoser:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StepperDoser
    settings:
      base:
        INFOPLIST_FILE: StepperDoser/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    scheme:
      testTargets: []
